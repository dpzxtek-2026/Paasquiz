<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Paasquiz 2026 🐣</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff9e6; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 25px; border: 5px solid #ffcc00; max-width: 500px; margin: 40px auto; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        h1 { color: #ff9900; font-size: 2.5em; }
        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 2px solid #eee; font-size: 1.1em; }
        button { background: #ffcc00; border: none; padding: 15px 30px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 95%; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #ff9900; color: white; transform: scale(1.02); }
        .kid-btn { background: #FF69B4; color: white; margin-top: 25px; }
        #quiz, #reactieSectie, #kidBox { display: none; }
        #vTekst { font-size: 1.4em; font-weight: bold; color: #333; min-height: 100px; padding: 20px; }
    </style>
</head>
<body>
    <div class="card" id="loginBox">
        <h1>🐰 Paasquiz 2026</h1>
        <input type="text" id="user" placeholder="Naam (Nana, Ronald, Mama)">
        <input type="password" id="pass" placeholder="Wachtwoord">
        <button onclick="login()">Inloggen</button>
        <button class="kid-btn" onclick="showKid()">Ik ben een kind 🐥</button>
    </div>

    <div class="card" id="kidBox">
        <h1>🐣 Kind Login</h1>
        <input type="text" id="kidName" placeholder="Hoe heet je?">
        <button onclick="start('kid')">Start de Quiz!</button>
    </div>

    <div class="card" id="quiz">
        <h2 id="vTitel" style="color:#d84315">Vraag 1</h2>
        <div id="vTekst">Laden...</div>
        <input type="text" id="antw" placeholder="Jouw antwoord...">
        <button onclick="volgende()">Verstuur & Volgende</button>
    </div>

    <div class="card" id="reactieSectie">
        <h1>🏁 Klaar!</h1>
        <p>Wat vond je ervan?</p>
        <input type="text" id="bericht" placeholder="Typ je berichtje...">
        <button onclick="stuurBericht()">Plaats op de muur 💬</button>
        <p><a href="reacties.html" style="color:#ff9900; font-weight:bold;">Bekijk de Live Muur</a></p>
    </div>

    <script>
        const supabaseClient = supabase.createClient("https://supabase.co", "sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV");
        const accounts = {"Nana":"Nana@paasquiz", "Ronald":"Ronald@paasquiz", "Mama":"Mama@paasquiz"};
        const vragen = ["Waarom verstoppen we eieren in de tuin?", "Ei heel lang gekookt?", "Kleur struisvogelei?", "Wat is eitje tikken?", "Wie brengt eieren in Frankrijk?", "Hoeveel eitjes legt een kip per jaar?", "Rood ei zonder verf?", "Geklutst ei in pan?", "Superdure Russische eieren?", "Blijft een vers ei drijven?", "Lekkerste uit de mand van de haas?", "Oranje groente voor de haas?", "Gele donzige vogel?", "Wie heeft de langste achterpoten?", "Naam lange flappers van haas?", "Woon je in Europa?", "Slaapplek van een haas?", "Hoeveel tanden heeft een konijn?", "Bekend wit konijn (Dick Bruna)?", "Australische eier-brenger?", "Luxe brood met rozijnen?", "Geel citroen-smeersel?", "Dunne knapperige paas-cracker?", "Gele paasbloem?", "Amandel-vulling in de stol?", "Dik geel drankje?", "Uitgebreid eten samen?", "Dé kleur van Pasen?", "Kronkelige takken in vaas?", "Choco-eitjes met suikerlaagje?"];
        
        let naam = "", vNr = 0;
        function login() { const u = document.getElementById('user').value; const p = document.getElementById('pass').value; if(accounts[u] === p) { naam = u; start(); } else { alert("Fout!"); } }
        function showKid() { document.getElementById('loginBox').style.display='none'; document.getElementById('kidBox').style.display='block'; }
        async function start(type) {
            if(type === 'kid') naam = document.getElementById('kidName').value + " (Kind)";
            document.getElementById('loginBox').style.display='none';
            document.getElementById('kidBox').style.display='none';
            document.getElementById('quiz').style.display='block';
            document.getElementById('vTekst').innerText = vragen[0];
            await supabaseClient.from('spelers').insert([{ naam: naam, antwoord: "Start", vraag_nr: 1 }]);
        }
        async function volgende() {
            const a = document.getElementById('antw').value;
            vNr++;
            if(vNr < 30) {
                document.getElementById('vTekst').innerText = vragen[vNr];
                document.getElementById('vTitel').innerText = "Vraag " + (vNr+1);
                document.getElementById('antw').value = "";
                await supabaseClient.from('spelers').update({ antwoord: a, vraag_nr: vNr+1 }).eq('naam', naam);
            } else {
                document.getElementById('quiz').style.display='none';
                document.getElementById('reactieSectie').style.display='block';
                await supabaseClient.from('spelers').update({ antwoord: a, vraag_nr: 30 }).eq('naam', naam);
            }
        }
        async function stuurBericht() {
            const b = document.getElementById('bericht').value;
            await supabaseClient.from('reacties').insert([{ naam: naam, bericht: b }]);
            document.getElementById('bericht').value = "";
            alert("Op de muur gezet!");
        }
    </script>
</body>
</html>
