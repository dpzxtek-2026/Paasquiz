<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paasquiz 2026 - Live Reactiemuur 🐣</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --paas-geel: #fff9c4;
            --paas-oranje: #ffb74d;
            --paas-accent: #ff7043;
            --kaart-wit: #ffffff;
            --tekst-bruin: #5d4037;
        }

        body {
            background-color: var(--paas-geel);
            background-image: radial-gradient(var(--paas-oranje) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--tekst-bruin);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--paas-accent);
            text-shadow: 2px 2px white;
            margin-bottom: 30px;
            text-align: center;
        }

        #muur-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .reactie-card {
            background: var(--kaart-wit);
            padding: 20px;
            border-radius: 15px;
            border-bottom: 5px solid var(--paas-oranje);
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .reactie-card:hover { transform: translateY(-5px); }

        .reactie-card::before {
            content: '🥚';
            position: absolute;
            top: 10px;
            right: 10px;
            opacity: 0.2;
            font-size: 1.2rem;
        }

        .naam {
            display: block;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--paas-accent);
            margin-bottom: 8px;
            border-bottom: 1px dashed var(--paas-oranje);
            padding-bottom: 5px;
        }

        .bericht { font-style: italic; line-height: 1.4; }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .empty-state { text-align: center; font-size: 1.2rem; margin-top: 50px; color: #9e9e9e; }
    </style>
</head>
<body>

    <h1>🐣 De Live Paasmuur 2026 🐰</h1>
    
    <div id="muur-container">
        <p class="empty-state">Wachten op de eerste paaswensen...</p>
    </div>

    <script>
        // Supabase Configuratie (NU MET JOUW PROJECT URL)
        const SUPABASE_URL = 'https://bltdlfuxiboskglkmbhd.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let bekendeIds = new Set();

        async function haalReactiesOp() {
            const { data, error } = await supabaseClient
                .from('reacties')
                .select('id, naam, bericht')
                .order('id', { ascending: true }); // We gebruiken ascending voor de 'prepend' logica

            if (error) {
                console.error('Fout bij ophalen:', error);
                return;
            }

            const container = document.getElementById('muur-container');
            
            if (data.length > 0 && document.querySelector('.empty-state')) {
                container.innerHTML = '';
            }

            data.forEach(reactie => {
                if (!bekendeIds.has(reactie.id)) {
                    const card = document.createElement('div');
                    card.className = 'reactie-card';
                    card.innerHTML = `
                        <span class="naam">${reactie.naam}</span>
                        <span class="bericht">"${reactie.bericht}"</span>
                    `;
                    
                    container.prepend(card);
                    bekendeIds.add(reactie.id);
                }
            });
        }

        haalReactiesOp();
        setInterval(haalReactiesOp, 3000);
    </script>
</body>
</html>
