<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Paasmuur 2026</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background: #fff9c4; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        h1 { color: #ff7043; font-size: 2.5rem; text-shadow: 2px 2px white; }
        #muur { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .post-it { background: white; padding: 20px; border-radius: 15px; border-bottom: 5px solid #ffb74d; box-shadow: 0 5px 15px rgba(0,0,0,0.1); animation: pop 0.5s; }
        @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>
    <h1>🐣 De Live Paasmuur 2026 🐰</h1>
    <div id="muur"></div>
<script>
    const supabaseClient = supabase.createClient('https://supabase.co', 'sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV');
    let ids = new Set();
    async function load() {
        const { data } = await supabaseClient.from('reacties').select('*').order('id', { ascending: true });
        data.forEach(r => {
            if (!ids.has(r.id)) {
                const card = document.createElement('div'); card.className = 'post-it';
                card.innerHTML = `<b style="color:#ff7043">${r.naam}</b><br><i>"${r.bericht}"</i>`;
                document.getElementById('muur').prepend(card); ids.add(r.id);
            }
        });
    }
    load(); setInterval(load, 3000);
</script>
</body>
</html>
