<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Paasquiz 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', system-ui, sans-serif; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
        h1 { font-weight: 300; margin-bottom: 20px; color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #334155; color: #94a3b8; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover { background: #1e293b; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; float: right; font-weight: bold; }
        .btn-reset:hover { background: #dc2626; }
        .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; width: 250px; text-align: center; font-size: 1.1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="login-gate" class="login-overlay">
    <input type="password" id="admin-pass" placeholder="Admin Wachtwoord (1234)" oninput="checkPass()">
</div>

<div class="container">
    <div class="card">
        <button class="btn-reset" onclick="resetDatabase()">Reset Quiz Data</button>
        <h1>Paasquiz Monitor</h1>
        <table>
            <thead>
                <tr>
                    <th>Naam</th>
                    <th>Vraag Nr.</th>
                    <th>Laatste Antwoord</th>
                </tr>
            </thead>
            <tbody id="player-table">
            </tbody>
        </table>
    </div>
</div>

<script>
    // GECORRIGEERDE URL VOOR JOUW PROJECT
    const SUPABASE_URL = 'https://bltdlfuxiboskglkmbhd.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV';
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    function checkPass() {
        if(document.getElementById('admin-pass').value === '1234') {
            document.getElementById('login-gate').classList.add('hidden');
            startMonitor();
        }
    }

    async function fetchData() {
        // GECORRIGEERD: Sorteren op id omdat updated_at misschien niet bestaat
        const { data, error } = await supabaseClient.from('spelers').select('*').order('id', { ascending: false });
        if (data) {
            const tbody = document.getElementById('player-table');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td style="font-weight: bold; color: #fbbf24;">${p.naam}</td>
                    <td>${p.vraag_nr}</td>
                    <td style="color: #94a3b8;">${p.antwoord || 'Geen'}</td>
                </tr>
            `).join('');
        }
    }

    async function resetDatabase() {
        if(confirm("Weet je het zeker? Dit verwijdert ALLE antwoorden en reacties!")) {
            // GECORRIGEERDE DELETE QUERY
            await supabaseClient.from('spelers').delete().neq('id', 0);
            await supabaseClient.from('reacties').delete().neq('id', 0);
            alert("Database is leeg!");
            fetchData();
        }
    }

    function startMonitor() {
        fetchData();
        setInterval(fetchData, 2000);
    }
</script>
</body>
</html>
