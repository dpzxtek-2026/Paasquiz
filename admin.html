<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - Paasquiz 2026</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Segoe UI', sans-serif; padding: 40px; }
        .card { background: #1e293b; padding: 24px; border-radius: 12px; border: 1px solid #334155; }
        h1 { color: #38bdf8; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { color: #94a3b8; }
        .btn-reset { background: #ef4444; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; float: right; font-weight: bold; }
        .login-overlay { position: fixed; inset: 0; background: #0f172a; display: flex; align-items: center; justify-content: center; z-index: 100; }
        input { padding: 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div id="login-gate" class="login-overlay">
    <input type="password" id="admin-pass" placeholder="Admin WW (1234)" oninput="if(this.value==='1234'){document.getElementById('login-gate').classList.add('hidden');start();}">
</div>
<div class="card">
    <button class="btn-reset" onclick="reset()">Reset Data</button>
    <h1>🐰 Paasquiz Monitor</h1>
    <table>
        <thead><tr><th>Naam</th><th>Vraag</th><th>Antwoord</th></tr></thead>
        <tbody id="p-table"></tbody>
    </table>
</div>
<script>
    const supabaseClient = supabase.createClient('https://supabase.co', 'sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV');
    async function refresh() {
        const { data } = await supabaseClient.from('spelers').select('*').order('id', { ascending: false });
        document.getElementById('p-table').innerHTML = data.map(p => `<tr><td>${p.naam}</td><td>${p.vraag_nr}</td><td>${p.antwoord}</td></tr>`).join('');
    }
    async function reset() { if(confirm("Wis alles?")){ await supabaseClient.from('spelers').delete().neq('id', 0); await supabaseClient.from('reacties').delete().neq('id', 0); refresh(); } }
    function start() { refresh(); setInterval(refresh, 2000); }
</script>
</body>
</html>
