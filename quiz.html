<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Paasquiz - Bezig... 🐣</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fff9e6; padding: 20px; color: #333; }
        .card { background: white; padding: 30px; border-radius: 25px; border: 4px solid #ffcc00; max-width: 500px; margin: 40px auto; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #vTitel { color: #d84315; font-size: 1.1em; }
        #vTekst { font-size: 1.4em; font-weight: bold; margin: 20px 0; min-height: 80px; }
        input { width: 90%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 1.1em; }
        button { background: #ffcc00; border: none; padding: 15px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1.1em; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="card" id="qBox">
        <h2 id="vTitel">Vraag 1 / 30</h2>
        <div id="vTekst">Laden...</div>
        <input type="text" id="ans" placeholder="Typ je antwoord...">
        <button onclick="next()">Verstuur & Volgende</button>
    </div>

    <div class="card hidden" id="fBox">
        <h1>🏁 Klaar!</h1>
        <p>Goed gedaan! Laat een berichtje achter op de muur:</p>
        <input type="text" id="msg" placeholder="Je berichtje...">
        <button onclick="send()">Plaats op de muur 💬</button>
    </div>

    <script>
        const sb = supabase.createClient('https://supabase.co', 'sb_publishable_U66BtV2nkxjqnCtevNBRqw_zOrdiBDV');
        const user = localStorage.getItem('paas_naam') || "Anoniem";
        const qs = ["Waarom verstoppen we eieren?", "Ei heel lang gekookt?", "Kleur struisvogelei?", "Wat is eitje tikken?", "Wie brengt eieren in Frankrijk?", "Hoeveel eitjes legt een kip per jaar?", "Rood ei zonder verf?", "Geklutst ei in pan?", "Superdure Russische eieren?", "Blijft een vers ei drijven?", "Lekkerste uit de mand van de haas?", "Oranje groente voor de haas?", "Gele donzige vogel?", "Wie heeft de langste achterpoten?", "Naam lange flappers van haas?", "Woon je in Europa?", "Slaapplek van een haas?", "Hoeveel tanden heeft een konijn?", "Bekend wit konijn (Dick Bruna)?", "Australische eier-brenger?", "Luxe brood met rozijnen?", "Geel citroen-smeersel?", "Dunne knapperige paas-cracker?", "Gele paasbloem?", "Amandel-vulling in de stol?", "Dik geel drankje?", "Uitgebreid eten samen?", "Dé kleur van Pasen?", "Kronkelige takken in vaas?", "Choco-eitjes met suikerlaagje?"];
        let n = 0;

        window.onload = () => { document.getElementById('vTekst').innerText = qs[0]; };

        async function next() {
            const a = document.getElementById('ans').value;
            if(!a) return;
            n++;
            if(n < 30) {
                document.getElementById('vTitel').innerText = `Vraag ${n+1} / 30`;
                document.getElementById('vTekst').innerText = qs;
                document.getElementById('ans').value = "";
                await sb.from('spelers').upsert({ naam: user, antwoord: a, vraag_nr: n+1 }, { onConflict: 'naam' });
            } else {
                document.getElementById('qBox').classList.add('hidden');
                document.getElementById('fBox').classList.remove('hidden');
                await sb.from('spelers').update({ antwoord: a, vraag_nr: 30 }).eq('naam', user);
            }
        }

        async function send() {
            const b = document.getElementById('msg').value;
            await sb.from('reacties').insert([{ naam: user, bericht: b }]);
            window.location.href = "reacties.html";
        }
    </script>
</body>
</html>
